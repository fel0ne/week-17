version: '3.8'

services:
  gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./Gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - notifications-svc-s05
      - devices-svc

  notifications-svc-s05:
    image: python:3.11-slim
    container_name: notifications-container
    command: sh -c "pip install -r requirements.txt && python main.py"
    ports:
      - "8151:8151"
    volumes:
      - ./notifications_svc:/app
    working_dir: /app

  devices-svc:
    image: python:3.11-slim
    command: sh -c "pip install fastapi uvicorn requests pydantic && python main.py"
    ports:
      - "8266:8266"
    volumes:
      - ./devices_svc:/app
    working_dir: /app