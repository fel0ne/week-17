
  deploy:
    needs: lint-and-test  
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

    
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

     
      - name: Build and Push Notifications Service
        uses: docker/build-push-action@v5
        with:
          context: ./notifications_svc
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/notifications-svc-s05:latest


      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}


      - name: Deploy to Kubernetes Cluster
        run: |

          kubectl set image deployment/notifications-app notifications-container=${{ secrets.DOCKER_USERNAME }}/notifications-svc-s05:latest --record
          
          kubectl rollout status deployment/notifications-app